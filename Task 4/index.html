<!DOCTYPE html>
<html>
<head>
    <title>Flask Notes App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <h1 class="text-center mb-4">Flask Notes App</h1>

    <form action="/add" method="POST" class="d-flex mb-4">
        <input type="text" name="note" class="form-control me-2" placeholder="Enter your note" required>
        <button class="btn btn-primary">Add</button>
    </form>

    <ul class="list-group">
        {% for note in notes %}
        <li class="list-group-item d-flex justify-content-between">
            {{ note }}
            <a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">Delete</a>
        </li>
        {% else %}
        <li class="list-group-item text-center">No notes added yet</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
